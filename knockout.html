// ── SORTED MATCHES (circular shift: pending first, done at end in original order) ──
function getSortedMatches(koResults) {
  const pending = R32_MATCHES.filter(m => !koResults[m.id]?.winner);
  const done    = R32_MATCHES.filter(m =>  koResults[m.id]?.winner);
  return [...pending, ...done];
}

// ── SCORING ───────────────────────────────────────────
function scoreGroupStage(name) {
  const p = GROUP_PREDS[name];
  let pts = 0;
  Object.keys(GROUP_RESULTS).forEach(g => {
    const r = GROUP_RESULTS[g], pred = p.groups[g];
    if (r.first  === pred.first)  pts++;
    if (r.second === pred.second) pts++;
    if (r.third  === pred.third)  pts++;
  });
  p.bestThirds.forEach(t => { if (BEST_THIRDS.includes(t)) pts++; });
  return pts;
}

function scoreKO(name, koResults) {
  const preds = KO_PREDS[name] || {};
  let pts = 0;
  R32_MATCHES.forEach(m => {
    const actual = koResults[m.id], pred = preds[m.id];
    if (!actual?.winner || !pred) return;
    const scoreMatch  = actual.homeGoals !== undefined && parseInt(actual.homeGoals) === pred.homeGoals && parseInt(actual.awayGoals) === pred.awayGoals;
    const winnerMatch = actual.winner === pred.winner;
    if (scoreMatch && winnerMatch) pts += 3;
    else if (scoreMatch)  pts += 2;
    else if (winnerMatch) pts += 1;
  });
  return pts;
}

function koMatchResult(name, matchId, koResults) {
  const actual = koResults[matchId], pred = (KO_PREDS[name]||{})[matchId];
  if (!actual?.winner || !pred) return null;
  const scoreMatch  = actual.homeGoals !== undefined && parseInt(actual.homeGoals) === pred.homeGoals && parseInt(actual.awayGoals) === pred.awayGoals;
  const winnerMatch = actual.winner === pred.winner;
  if (scoreMatch && winnerMatch) return "both";
  if (scoreMatch)  return "score";
  if (winnerMatch) return "winner";
  return "none";
}

  const maxTotal = 44 + R32_MATCHES.length * 3;
  const rows = PARTICIPANTS.map(name => {
    const gs = scoreGroupStage(name), ko = scoreKO(name, state.koResults);
    return { name, gs, ko, total: gs + ko };
  }).sort((a,b) => b.total - a.total);

  let html = `<div class="section-title">Leaderboard</div>

// ── MATCH CARD BUILDER ────────────────────────────────
function matchCard(m, koResults, opts) {
  // opts: { showPred: name|null, isEdit: bool }
  const r = koResults[m.id] || {};
  const hasResult = !!r.winner;
  const isNext = !hasResult;
  const pred = opts.showPred ? (KO_PREDS[opts.showPred]||{})[m.id] : null;
  const c = opts.showPred ? COLORS[opts.showPred] : "#0f172a";
  const result = opts.showPred ? koMatchResult(opts.showPred, m.id, koResults) : null;

  // badge for KO predictions view
  let badgeHtml = '';
  if (opts.showPred) {
    if (!hasResult)          badgeHtml = `<span class="badge pending">pending</span>`;
    else if (result==="both")   badgeHtml = `<span class="badge correct">✓ +3</span>`;
    else if (result==="score")  badgeHtml = `<span class="badge partial">score +2</span>`;
    else if (result==="winner") badgeHtml = `<span class="badge partial">winner +1</span>`;
    else                        badgeHtml = `<span class="badge wrong">✗ 0</span>`;
  } else if (!opts.isEdit) {
    badgeHtml = hasResult ? `<span class="badge correct">✓ done</span>` : `<span class="badge pending">pending</span>`;
  }

  if (isNext && !opts.isEdit) badgeHtml = `<span class="badge next">▶ next</span>` + badgeHtml;

  const homeFlag = m.home.split(" ")[0], homeName = m.home.split(" ").slice(1).join(" ");
  const awayFlag = m.away.split(" ")[0], awayName = m.away.split(" ").slice(1).join(" ");

  if (opts.isEdit) {
    return `<div class="match-card ${isNext?'is-next':''}">
      <div class="match-header">
        <span class="match-tag">${m.tag}</span>
        <span class="match-time">🕐 ${m.time}</span>
        ${isNext ? `<span class="badge next">▶ next</span>` : `<span class="badge correct">✓ saved</span>`}
      </div>
      <div class="match-body">
        <div class="match-teams" style="margin-bottom:10px;">
          <div class="match-team"><span style="font-size:20px;">${homeFlag}</span><span class="team-name">${homeName}</span></div>
          <div style="display:flex;align-items:center;gap:6px;">
            <input type="number" min="0" max="20" class="score-input" data-mid="${m.id}" data-field="homeGoals" value="${r.homeGoals??''}" placeholder="0">
            <span class="vs-sep">—</span>
            <input type="number" min="0" max="20" class="score-input" data-mid="${m.id}" data-field="awayGoals" value="${r.awayGoals??''}" placeholder="0">
          </div>
          <div class="match-team"><span style="font-size:20px;">${awayFlag}</span><span class="team-name">${awayName}</span></div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:12px;color:#64748b;flex-shrink:0;">🚀 Advances:</span>
          <select class="winner-select" data-mid="${m.id}" data-field="winner">
            <option value="">— select —</option>
            <option value="${esc(m.home)}" ${r.winner===m.home?'selected':''}>${esc(m.home)}</option>
            <option value="${esc(m.away)}" ${r.winner===m.away?'selected':''}>${esc(m.away)}</option>
          </select>
        </div>
      </div>
    </div>`;
  }

  // view mode (predictions or results)
  const homeScore = opts.showPred ? (pred?.homeGoals??'?') : (hasResult ? r.homeGoals : '?');
  const awayScore = opts.showPred ? (pred?.awayGoals??'?') : (hasResult ? r.awayGoals : '?');
  const winnerDisplay = opts.showPred ? (pred?.winner??'?') : (r.winner||'—');
  const scoreColor = opts.showPred ? c : "#0f172a";

  return `<div class="match-card ${isNext?'is-next':''}">
    <div class="match-header">
      <span class="match-tag">${m.tag}</span>
      <span class="match-time">🕐 ${m.time}</span>
      ${badgeHtml}
    </div>
    <div class="match-body">
      <div class="match-teams">
        <div class="match-team"><span style="font-size:22px;">${homeFlag}</span><span class="team-name">${homeName}</span></div>
        <div style="text-align:center;">
          <div style="display:flex;align-items:center;gap:4px;">
            <span class="score-box" style="color:${scoreColor};">${homeScore}</span>
            <span class="vs-sep">—</span>
            <span class="score-box" style="color:${scoreColor};">${awayScore}</span>
          </div>
          ${opts.showPred && hasResult ? `<div style="font-size:10px;color:#94a3b8;margin-top:2px;">actual: ${r.homeGoals}–${r.awayGoals}</div>` : ''}
        </div>
        <div class="match-team"><span style="font-size:22px;">${awayFlag}</span><span class="team-name">${awayName}</span></div>
      </div>
      <div class="match-result-row">
        🚀 <span class="winner-badge" style="background:${c}22;color:${c};">${esc(winnerDisplay)}</span>
        ${opts.showPred && hasResult && pred?.winner !== r.winner ? `<span style="font-size:11px;color:#94a3b8;">actual: ${esc(r.winner)}</span>` : ''}
      </div>
    </div>
  </div>`;
}

  const name = state.selectedParticipant, c = COLORS[name], ko = scoreKO(name, state.koResults);
  const sorted = getSortedMatches(state.koResults);
  let html = participantSelector() +
    `<div class="summary-banner">
      <div style="width:48px;height:48px;border-radius:50%;background:${c}22;border:2px solid ${c};display:flex;align-items:center;justify-content:center;font-size:24px;">${AVATARS[name]}</div>
      <div><div style="font-weight:800;font-size:20px;">${name}</div><div style="color:#64748b;font-size:12px;">Knockout Predictions</div></div>
      <div style="margin-left:auto;text-align:right;"><div style="font-weight:800;font-size:26px;color:${c};">${ko}</div><div style="font-size:11px;color:#94a3b8;">KO pts</div></div>
    </div><div class="grid3">`;
  sorted.forEach(m => { html += matchCard(m, state.koResults, { showPred: name }); });
  return html + `</div>`;
}

// ── KO RESULTS VIEW ───────────────────────────────────
function renderKOResults() {
  const sorted = getSortedMatches(state.koResults);
  let html = `<div class="section-title">Knockout Results</div>
  <div class="section-sub">R32 match results. Use "Enter Results" tab to update.</div>
  <div class="grid3">`;
  sorted.forEach(m => { html += matchCard(m, state.koResults, {}); });
  return html + `</div>`;
}

// ── KO EDIT ───────────────────────────────────────────
function renderKOEdit() {
  const sorted = getSortedMatches(state.koResults);
  let html = `<div class="section-title">Enter KO Results</div>
  <div class="section-sub">Enter scores and advancing team. Saves instantly for everyone.</div>
  <div class="grid3">`;
  sorted.forEach(m => { html += matchCard(m, state.koResults, { isEdit: true }); });
  return html + `</div>`;
}

// ── PARTICIPANT SELECTOR (sticky) ─────────────────────
function participantSelector() {
  return `<div class="pred-sticky">
    <div class="pred-chips">${PARTICIPANTS.map(n => {
      const c = COLORS[n];
      return `<button class="pred-chip ${state.selectedParticipant===n?'active':''}" data-name="${n}" style="--c:${c};--c18:${c}18;">${AVATARS[n]} ${n}</button>`;
    }).join("")}</div>
  </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────
function render() {
  renderTabs();
  updateHeaderHeight();
  const el = document.getElementById("content");
  if      (state.tab==="leaderboard") el.innerHTML = renderLeaderboard();
  else if (state.tab==="gs_results")  el.innerHTML = renderGSResults();
  else if (state.tab==="gs_preds")    el.innerHTML = renderGSPreds();
  else if (state.tab==="ko_preds")    el.innerHTML = renderKOPreds();
  else if (state.tab==="ko_results")  el.innerHTML = renderKOResults();
  else if (state.tab==="ko_edit")     el.innerHTML = renderKOEdit();

  document.querySelectorAll(".pred-chip").forEach(b => {
    b.onclick = () => { state.selectedParticipant = b.dataset.name; render(); };
  });
  if (state.tab==="ko_edit") {
    document.querySelectorAll(".score-input").forEach(inp => {
      inp.onchange = () => writeKOResult(inp.dataset.mid, inp.dataset.field, parseInt(inp.value)||0);
    });
    document.querySelectorAll(".winner-select").forEach(sel => {
      sel.onchange = () => { if (sel.value) writeKOResult(sel.dataset.mid, sel.dataset.field, sel.value); };
    });
  }
}

window.addEventListener("resize", updateHeaderHeight);
render();
</script>

</body>
</html>
