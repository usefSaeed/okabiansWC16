<title>Family WC 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#0d0d0f;color:#f0f0f0;min-height:100vh;}
button,select{font-family:inherit;}
::-webkit-scrollbar{height:5px;width:5px;}
::-webkit-scrollbar-thumb{background:#2a2a2e;border-radius:99px;}

/* HEADER */
.hdr{background:#0d0d0f;border-bottom:1px solid #1e1e24;position:sticky;top:0;z-index:200;padding:14px 16px 0;}
.hdr-inner{max-width:960px;margin:0 auto;}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.hdr-title{font-size:17px;font-weight:800;letter-spacing:-0.3px;}
.hdr-sub{font-size:11px;color:#555;}
.tabs{display:flex;gap:0;overflow-x:auto;padding-bottom:0;}
.tab{padding:9px 14px;background:transparent;border:none;color:#555;font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;letter-spacing:.3px;text-transform:uppercase;}
.tab.active{color:#f0f0f0;border-bottom-color:#e8ff47;}
.statusbar{max-width:960px;margin:0 auto;padding:5px 16px;font-size:11px;color:#444;display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot.live{background:#22c55e;}
.dot.off{background:#f97316;}
.dot.err{background:#ef4444;}

/* CONTENT */
.content{max-width:960px;margin:0 auto;padding:20px 16px 80px;}
.pg-title{font-size:22px;font-weight:800;color:#f0f0f0;margin-bottom:3px;letter-spacing:-0.5px;}
.pg-sub{font-size:12px;color:#555;margin-bottom:22px;}

/* CARDS */
.card{background:#111115;border:1px solid #1e1e24;border-radius:12px;padding:16px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;white-space:nowrap;}
.badge.correct{background:#052e16;color:#4ade80;border:1px solid #166534;}
.badge.wrong{background:#2d0a0a;color:#f87171;border:1px solid #7f1d1d;}
.badge.pending{background:#1a1a20;color:#555;border:1px solid #2a2a30;}

/* LEADERBOARD */
.lb-row{background:#111115;border:1px solid #1e1e24;border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;margin-bottom:10px;transition:border-color .2s;}
.lb-rank{width:34px;text-align:center;flex-shrink:0;}
.lb-avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;}
.lb-bar{margin-top:5px;height:4px;background:#1e1e24;border-radius:99px;overflow:hidden;}
.lb-fill{height:100%;border-radius:99px;transition:width .8s ease;}

/* GROUP LABEL */
.glabel{background:#e8ff47;color:#0d0d0f;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:800;letter-spacing:.5px;}
.glabel-dark{background:#1e1e24;color:#888;border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;}

/* MATCH CARD */
.match-card{background:#111115;border:1px solid #1e1e24;border-radius:12px;overflow:hidden;}
.match-header{background:#161619;padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e1e24;}
.match-tag{font-size:10px;font-weight:700;color:#e8ff47;letter-spacing:.5px;text-transform:uppercase;}
.match-time{font-size:10px;color:#444;}
.match-body{padding:14px;}
.match-team-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;}
.match-team-name{font-size:13px;font-weight:600;flex:1;}
.match-score{font-size:20px;font-weight:800;width:28px;text-align:center;color:#e8ff47;}
.match-score.pending-score{color:#333;}
.match-vs{text-align:center;font-size:10px;color:#333;padding:3px 0;font-weight:700;letter-spacing:1px;}
.advance-pill{margin-top:10px;padding:7px 10px;background:#0d1f0d;border-radius:8px;border:1px solid #166534;font-size:12px;font-weight:700;color:#4ade80;display:flex;align-items:center;gap:6px;}
.advance-pill.pending-adv{background:#161619;border-color:#1e1e24;color:#444;}

/* PREDICT TABS */
.ptab{padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600;border:1.5px solid #1e1e24;background:#111115;color:#666;cursor:pointer;transition:all .15s;}
.ptab.active{border-color:var(--pc);color:var(--pc);background:var(--pcbg);}

/* EDIT SELECT */
select.eselect{width:100%;padding:7px 10px;border-radius:8px;border:1px solid #2a2a30;background:#0d0d0f;color:#f0f0f0;font-size:13px;cursor:pointer;outline:none;appearance:none;}
select.eselect:focus{border-color:#e8ff47;}
input.escore{width:52px;padding:6px 8px;border-radius:8px;border:1px solid #2a2a30;background:#0d0d0f;color:#e8ff47;font-size:15px;font-weight:800;text-align:center;outline:none;}
input.escore:focus{border-color:#e8ff47;}

/* SECTION DIVIDER */
.sec-divider{display:flex;align-items:center;gap:10px;margin:24px 0 16px;}
.sec-divider-line{flex:1;height:1px;background:#1e1e24;}
.sec-divider-label{font-size:11px;font-weight:700;color:#444;letter-spacing:1px;text-transform:uppercase;}

/* SUMMARY BANNER */
.sum-banner{background:#111115;border:1px solid #1e1e24;border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:22px;}

/* RESPONSIVE */
@media(max-width:480px){
  .hdr-title{font-size:15px;}
  .tab{font-size:11px;padding:8px 10px;}
  .pg-title{font-size:18px;}
  .lb-row{padding:12px 14px;}
}
</style>

// в”Ђв”Ђ SCORING в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function gsScore(p){
  let pts=0;
  Object.keys(GROUPS).forEach(g=>{
    const r=GS_RESULTS[g], pr=p.gs[g];
    if(!r||!pr) return;
    if(r.first===pr.first) pts++;
    if(r.second===pr.second) pts++;
    if(r.third===pr.third) pts++;
  });
  p.gsBestThirds.forEach(t=>{ if(GS_BEST_THIRDS.includes(t)) pts++; });
  return pts;
}
function r32Score(p){
  let pts=0;
  R32.forEach(m=>{
    const actual=state.r32results[m.id];
    const pred=p.r32[m.id];
    if(!actual||!pred) return;
    const goalsMatch = actual.goalsA!==undefined && actual.goalsA===pred.goalsA && actual.goalsB===pred.goalsB;
    const winnerMatch = actual.advance && actual.advance===pred.advance;
    if(goalsMatch && winnerMatch) pts+=3;
    else if(goalsMatch) pts+=2;
    else if(winnerMatch) pts+=1;
  });
  return pts;
}
function totalScore(p){ return gsScore(p)+r32Score(p); }
function gsMaxPossible(p){
  // GS is final вЂ” fixed score
  return gsScore(p);
}
function r32MaxPossible(p){
  let max=0;
  R32.forEach(m=>{
    const actual=state.r32results[m.id];
    const pred=p.r32[m.id];
    if(!actual) { max+=3; return; }
    const goalsMatch = actual.goalsA!==undefined && actual.goalsA===pred.goalsA && actual.goalsB===pred.goalsB;
    const winnerMatch = actual.advance && actual.advance===pred.advance;
    if(goalsMatch && winnerMatch) max+=3;
    else if(goalsMatch) max+=2;
    else if(winnerMatch) max+=1;
  });
  return max;
}

// в”Ђв”Ђ RENDER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const TABS = [
  {id:"leaderboard",label:"рџЏ† Standings"},
  {id:"gs",label:"рџ“Љ Group Stage"},
  {id:"r32pred",label:"рџ”® R32 Predictions"},
  {id:"r32results",label:"вњЏпёЏ Enter Results"},
];

function renderTabs(){
  document.getElementById("tabs").innerHTML = TABS.map(t=>
    `<button class="tab ${state.tab===t.id?'active':''}" data-t="${t.id}">${t.label}</button>`
  ).join("");
  document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{state.tab=b.dataset.t;render();});
}

function esc(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// в”Ђв”Ђв”Ђ LEADERBOARD в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderLeaderboard(){
  const rows = PREDICTORS.map(p=>({p, gs:gsScore(p), r32:r32Score(p), total:totalScore(p)}))
    .sort((a,b)=>b.total-a.total);
  const GS_MAX = 44; // 12*3 + 8
  const R32_MAX = 16*3; // 48
  const TOTAL_MAX = GS_MAX + R32_MAX;

  let html=`<div class="pg-title">Standings</div>
  <div class="pg-sub">Group stage: max 44 pts В· Round of 32: max 48 pts В· Total: 92 pts</div>`;

  rows.forEach((row,rank)=>{
    const {p,gs,r32,total}=row;
    const pct=total/TOTAL_MAX*100;
    const medal=rank===0?"рџҐ‡":rank===1?"рџҐ€":rank===2?"рџҐ‰":`#${rank+1}`;
    const isFirst=rank===0;
    html+=`<div class="lb-row" style="${isFirst?`border-color:${p.color};box-shadow:0 0 20px ${p.color}22;`:''}">
      <div class="lb-rank" style="font-size:${rank<3?22:16}px;">${medal}</div>
      <div class="lb-avatar" style="width:42px;height:42px;background:${p.color}18;border:2px solid ${p.color};font-size:20px;">${p.avatar}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:15px;">${esc(p.name)}</div>
        <div style="display:flex;gap:8px;margin-top:3px;">
          <span style="font-size:11px;color:#555;">GS <strong style="color:#888;">${gs}</strong></span>
          <span style="font-size:11px;color:#555;">R32 <strong style="color:#888;">${r32}</strong></span>
        </div>
        <div class="lb-bar"><div class="lb-fill" style="width:${pct}%;background:${p.color};"></div></div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-weight:800;font-size:26px;color:${p.color};">${total}</div>
        <div style="font-size:11px;color:#444;">pts</div>
      </div>
    </div>`;
  });
  return html;
}

// в”Ђв”Ђв”Ђ GROUP STAGE VIEW в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderGS(){
  let html=`<div class="pg-title">Group Stage</div>
  <div class="pg-sub">Final standings вЂ” group stage is complete and locked.</div>`;

  // results grid
  html+=`<div class="sec-divider"><div class="sec-divider-line"></div><div class="sec-divider-label">Final Group Standings</div><div class="sec-divider-line"></div></div>
  <div class="grid" style="margin-bottom:24px;">`;
  Object.keys(GROUPS).forEach(g=>{
    const r=GS_RESULTS[g];
    html+=`<div class="card">
      <div style="font-weight:700;font-size:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
        <span class="glabel">Group ${g}</span>
      </div>`;
    ["first","second","third"].forEach((pos,idx)=>{
      const isAdv = pos==="third" && GS_BEST_THIRDS.includes(r[pos]);
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;${idx<2?'border-bottom:1px solid #1a1a1f;':''}">
        <span style="font-size:14px;">${MEDAL[pos]}</span>
        <span style="font-size:12px;flex:1;">${esc(r[pos]||'вЂ”')}</span>
        ${isAdv?`<span style="font-size:10px;background:#052e16;color:#4ade80;border-radius:4px;padding:1px 5px;border:1px solid #166534;">advances</span>`:''}
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;

  // predictions scoring
  html+=`<div class="sec-divider"><div class="sec-divider-line"></div><div class="sec-divider-label">Prediction Scores</div><div class="sec-divider-line"></div></div>
  <div class="grid-2">`;
  PREDICTORS.forEach(p=>{
    const score=gsScore(p);
    let details=[];
    Object.keys(GROUPS).forEach(g=>{
      const r=GS_RESULTS[g],pr=p.gs[g];
      let pts=0;
      if(r.first===pr.first) pts++;
      if(r.second===pr.second) pts++;
      if(r.third===pr.third) pts++;
      details.push({g,pts,pr,r});
    });
    let btPts=0; p.gsBestThirds.forEach(t=>{ if(GS_BEST_THIRDS.includes(t)) btPts++; });
    html+=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="width:30px;height:30px;border-radius:50%;background:${p.color}22;border:1.5px solid ${p.color};display:inline-flex;align-items:center;justify-content:center;font-size:16px;">${p.avatar}</span>
          <span style="font-weight:700;font-size:14px;">${esc(p.name)}</span>
        </div>
        <span style="font-size:20px;font-weight:800;color:${p.color};">${score} <span style="font-size:12px;color:#444;">/ 44</span></span>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;">
        ${details.map(d=>`<span style="font-size:11px;background:#1a1a20;border-radius:5px;padding:2px 7px;color:${d.pts===3?'#4ade80':d.pts===2?'#facc15':d.pts===1?'#fb923c':'#555'};">${d.g}: ${d.pts}pt</span>`).join("")}
      </div>
      <div style="font-size:11px;color:#555;">Best thirds: <span style="color:${btPts>=6?'#4ade80':'#fb923c'};">${btPts}/8</span> correct</div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

// в”Ђв”Ђв”Ђ R32 PREDICTIONS VIEW в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderR32Pred(){
  const p = PREDICTORS[state.selPred];
  let tabsHtml=`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">`;
  PREDICTORS.forEach((pr,i)=>{
    const act=state.selPred===i;
    tabsHtml+=`<button class="ptab ${act?'active':''}" data-pi="${i}" style="--pc:${pr.color};--pcbg:${pr.color}18;">${pr.avatar} ${esc(pr.name)}</button>`;
  });
  tabsHtml+=`</div>`;

  const r32pts=r32Score(p);
  let html=tabsHtml;
  html+=`<div class="sum-banner">
    <div style="width:46px;height:46px;border-radius:50%;background:${p.color}18;border:2px solid ${p.color};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">${p.avatar}</div>
    <div><div style="font-weight:800;font-size:18px;">${esc(p.name)}</div><div style="font-size:11px;color:#444;">Round of 32 predictions</div></div>
    <div style="margin-left:auto;text-align:right;">
      <div style="font-weight:800;font-size:24px;color:${p.color};">${r32pts}</div>
      <div style="font-size:11px;color:#444;">R32 pts so far</div>
    </div>
  </div>`;

  html+=`<div class="grid-2">`;
  R32.forEach(m=>{
    const pred=p.r32[m.id];
    const actual=state.r32results[m.id];
    const played=actual && actual.advance;
    const goalsMatch=played && actual.goalsA===pred.goalsA && actual.goalsB===pred.goalsB;
    const winnerMatch=played && actual.advance===pred.advance;
    let pts=0, badgeKind="pending", badgeText="pending";
    if(played){
      if(goalsMatch&&winnerMatch){pts=3;badgeKind="correct";badgeText="вљЎ 3pts";}
      else if(goalsMatch){pts=2;badgeKind="correct";badgeText="вњ“ 2pts (goals)";}
      else if(winnerMatch){pts=1;badgeKind="correct";badgeText="вњ“ 1pt (winner)";}
      else{pts=0;badgeKind="wrong";badgeText="вњ— 0pts";}
    }
    html+=`<div class="match-card">
      <div class="match-header">
        <span class="match-tag">${m.tag}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="badge ${badgeKind}">${badgeText}</span>
          <span class="match-time">${m.date}</span>
        </div>
      </div>
      <div class="match-body">
        <div class="match-team-row">
          <span class="match-team-name">${esc(m.teamA)}</span>
          <span class="match-score${played?'':' pending-score'}">${played?actual.goalsA:'?'}</span>
        </div>
        <div class="match-vs">VS</div>
        <div class="match-team-row">
          <span class="match-team-name">${esc(m.teamB)}</span>
          <span class="match-score${played?'':' pending-score'}">${played?actual.goalsB:'?'}</span>
        </div>
        <div style="font-size:11px;color:#444;margin-top:8px;margin-bottom:4px;">Predicted:</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <span style="font-size:12px;background:#1a1a20;border-radius:6px;padding:3px 8px;">${esc(pred.goalsA)} вЂ“ ${esc(pred.goalsB)}</span>
          <span style="font-size:12px;background:#1a1a20;border-radius:6px;padding:3px 8px;">Adv: ${esc(pred.advance)}</span>
        </div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

// в”Ђв”Ђв”Ђ ENTER R32 RESULTS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderR32Edit(){
  let html=`<div class="pg-title">Enter R32 Results</div>
  <div class="pg-sub">Enter the actual score and advancing team after each match. Saves instantly.</div>
  <div class="grid-2">`;
  R32.forEach(m=>{
    const r=state.r32results[m.id]||{};
    const teams=[m.teamA,m.teamB];
    html+=`<div class="match-card">
      <div class="match-header">
        <span class="match-tag">${m.tag}</span>
        <span class="match-time">${m.date}</span>
      </div>
      <div class="match-body">
        <div style="font-size:11px;color:#555;margin-bottom:8px;font-weight:600;">Score</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <span style="font-size:12px;flex:1;">${esc(m.teamA)}</span>
          <input class="escore" type="number" min="0" max="20" value="${r.goalsA??''}" data-mid="${m.id}" data-f="goalsA" placeholder="вЂ“"/>
          <span style="color:#333;font-weight:700;">вЂ“</span>
          <input class="escore" type="number" min="0" max="20" value="${r.goalsB??''}" data-mid="${m.id}" data-f="goalsB" placeholder="вЂ“"/>
          <span style="font-size:12px;flex:1;text-align:right;">${esc(m.teamB)}</span>
        </div>
        <div style="font-size:11px;color:#555;margin-bottom:6px;font-weight:600;">Advances</div>
        <select class="eselect" data-mid="${m.id}" data-f="advance">
          <option value="">вЂ” not played вЂ”</option>
          ${teams.map(t=>`<option value="${esc(t)}" ${r.advance===t?'selected':''}>${esc(t)}</option>`).join("")}
        </select>
      </div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

// в”Ђв”Ђв”Ђ MAIN RENDER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function render(){
  renderTabs();
  const el=document.getElementById("content");
  if(state.tab==="leaderboard") el.innerHTML=renderLeaderboard();
  else if(state.tab==="gs") el.innerHTML=renderGS();
  else if(state.tab==="r32pred") el.innerHTML=renderR32Pred();
  else if(state.tab==="r32results") el.innerHTML=renderR32Edit();

  if(state.tab==="r32pred"){
    document.querySelectorAll("[data-pi]").forEach(b=>b.onclick=()=>{state.selPred=+b.dataset.pi;render();});
  }
  if(state.tab==="r32results"){
    // debounce score inputs
    document.querySelectorAll(".escore,.eselect").forEach(el=>{
      el.onchange=()=>saveR32Match(el.dataset.mid);
    });
  }
}

function saveR32Match(mid){
  const goalsAEl=document.querySelector(`.escore[data-mid="${mid}"][data-f="goalsA"]`);
  const goalsBEl=document.querySelector(`.escore[data-mid="${mid}"][data-f="goalsB"]`);
  const advEl=document.querySelector(`.eselect[data-mid="${mid}"][data-f="advance"]`);
  const obj={
    goalsA: goalsAEl&&goalsAEl.value!==''?parseInt(goalsAEl.value):null,
    goalsB: goalsBEl&&goalsBEl.value!==''?parseInt(goalsBEl.value):null,
    advance: advEl?advEl.value:""
  };
  writeR32(mid, obj);
}

render();
</script>
