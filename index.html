// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// SCORING
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function calcScore(predictor, results, bestThirdsResult) {
  let pts = 0;
  Object.keys(GROUPS).forEach(g => {
    const r = results[g], p = predictor.groups[g];
    if (!r || !p) return;
    if (r.first && r.first === p.first) pts++;
    if (r.second && r.second === p.second) pts++;
    if (r.third && r.third === p.third) pts++;
  });
  if (bestThirdsResult && bestThirdsResult.length) {
    predictor.bestThirds.forEach(t => { if (bestThirdsResult.includes(t)) pts++; });
  }
  return pts;
}
function maxPossible(predictor, results, bestThirdsResult) {
  let max = 0;
  Object.keys(GROUPS).forEach(g => {
    const r = results[g], p = predictor.groups[g];
    if (!r || !p) { max += 3; return; }
    if (!r.first) max++; else if (r.first === p.first) max++;
    if (!r.second) max++; else if (r.second === p.second) max++;
    if (!r.third) max++; else if (r.third === p.third) max++;
  });
  predictor.bestThirds.forEach(t => {
    if (!bestThirdsResult || !bestThirdsResult.length || bestThirdsResult.includes(t)) max++;
  });
  return max;
}

// RENDER HELPERS
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function esc(s) { return (s ?? "").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function renderTabs() {
  const TABS = [
    { id: "leaderboard", label: "ðŸ† Leaderboard" },
    { id: "results", label: "ðŸ“Š Group Results" },
    { id: "predictions", label: "ðŸ‘¤ Predictions" },
    { id: "edit", label: "âœï¸ Edit Results" },
  ];
  document.getElementById("tabs").innerHTML = TABS.map(t =>
    `<button class="tab-btn ${state.tab===t.id?'active':''}" data-tab="${t.id}">${t.label}</button>`
  ).join("");
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.onclick = () => { state.tab = b.dataset.tab; render(); };
  });
}

function renderLeaderboard() {
  const scored = PREDICTORS.map((p,i) => ({
    ...p, score: calcScore(p, state.results, state.bestThirds),
    max: maxPossible(p, state.results, state.bestThirds), avatarIdx: i
  })).sort((a,b) => b.score - a.score);
  const maxTotal = Object.keys(GROUPS).length * 3 + 8;

  let html = `<div class="section-title">Leaderboard</div>
  <div class="section-sub">Max 44 pts total (3 per group Ã— 12 + 8 best-thirds bonus)</div>`;

  scored.forEach((p, rank) => {
    const color = AVATAR_COLORS[p.avatarIdx % AVATAR_COLORS.length];
    const pct = maxTotal ? (p.score / maxTotal * 100) : 0;
    const medal = rank===0 && p.score>0 ? "ðŸ¥‡" : rank===1 ? "ðŸ¥ˆ" : rank===2 ? "ðŸ¥‰" : `#${rank+1}`;
    const isFirst = rank===0 && p.score>0;
    html += `
      <div class="leader-row" style="${isFirst?`border:2px solid ${color};box-shadow:0 4px 16px ${color}33;`:''}">
        <div class="leader-rank" style="font-size:${rank===0?28:rank===1?24:rank===2?20:18}px;">${medal}</div>
        <div class="avatar" style="width:44px;height:44px;background:${color}22;border:2px solid ${color};font-size:22px;">${AVATARS[p.avatarIdx % AVATARS.length]}</div>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:16px;">${esc(p.name)}</div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg, ${color}, ${color}bb);"></div></div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-weight:800;font-size:28px;color:${color};">${p.score}</div>
          <div style="font-size:12px;color:#9ca3af;">max ${p.max}</div>
        </div>
      </div>`;
  });
  return html;
}

function renderGroupResults() {
  let html = `<div class="section-title">Group Results</div>
  <div class="section-sub">Current standings across all 12 groups.</div><div class="grid">`;
  Object.keys(GROUPS).forEach(g => {
    const r = state.results[g] || {};
    const hasAny = r.first || r.second || r.third;
    html += `<div class="card">
      <div style="font-weight:700;font-size:13px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">
        <span class="group-label">Group ${g}</span>
        ${!hasAny ? `<span style="font-size:11px;color:#d1d5db;">awaiting results</span>` : ''}
      </div>`;
    ["first","second","third"].forEach((pos,idx) => {
      const advTag = (pos==="third" && r[pos] && state.bestThirds.includes(r[pos]))
        ? `<span style="margin-left:auto;font-size:11px;background:#fef9c3;color:#854d0e;border-radius:6px;padding:1px 6px;">advances âœ“</span>` : '';
      html += `<div class="pos-row ${idx<2?'bordered':''}">
        <span class="medal">${MEDAL[pos]}</span>
        <span style="font-size:13px;color:${r[pos]?'#111':'#d1d5db'};">${esc(r[pos]||'â€”')}</span>
        ${advTag}
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

function renderPredictions() {
  let tabsHtml = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">`;
  PREDICTORS.forEach((p,i) => {
    const color = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const active = state.selectedPredictor === i;
    tabsHtml += `<button class="predictor-tab ${active?'active':''}" data-pidx="${i}"
      style="--c:${color};--c18:${color}18;">${AVATARS[i%AVATARS.length]} ${esc(p.name)}</button>`;
  });
  tabsHtml += `</div>`;

  const p = PREDICTORS[state.selectedPredictor];
  const color = AVATAR_COLORS[state.selectedPredictor % AVATAR_COLORS.length];
  const score = calcScore(p, state.results, state.bestThirds);
  const max = maxPossible(p, state.results, state.bestThirds);

  let html = tabsHtml + `
    <div class="summary-banner">
      <div class="avatar" style="width:52px;height:52px;background:${color}22;border:2px solid ${color};font-size:26px;">${AVATARS[state.selectedPredictor%AVATARS.length]}</div>
      <div>
        <div style="font-weight:800;font-size:22px;">${esc(p.name)}</div>
        <div style="color:#6b7280;font-size:13px;">${esc(p.email)}</div>
      </div>
      <div style="margin-left:auto;text-align:right;">
        <div style="font-weight:800;font-size:28px;color:${color};">${score} <span style="font-size:14px;font-weight:500;color:#9ca3af;">/ ${max} possible</span></div>
        <div style="font-size:12px;color:#9ca3af;">current pts</div>
      </div>
    </div>
    <div class="grid">`;

  Object.keys(GROUPS).forEach(g => {
    const gp = p.groups[g];
    const r = state.results[g] || {};
    html += `<div class="card">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px;"><span class="group-label" style="background:${color};">Group ${g}</span></div>`;
    ["first","second","third"].forEach((pos,idx) => {
      const predicted = gp[pos];
      const actual = r[pos];
      const isCorrect = actual && predicted === actual;
      const badgeKind = !actual ? "pending" : isCorrect ? "correct" : "wrong";
      const badgeText = !actual ? "pending" : isCorrect ? "âœ“" : `âœ— ${esc(actual)}`;
      html += `<div class="pos-row ${idx<2?'bordered':''}">
        <span class="medal">${MEDAL[pos]}</span>
        <span style="font-size:13px;flex:1;">${esc(predicted||'â€”')}</span>
        <span class="badge ${badgeKind}">${badgeText}</span>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  html += `<div class="card" style="margin-top:20px;">
    <div style="font-weight:700;font-size:14px;margin-bottom:12px;">Best 8 Third-Place Picks</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">`;
  p.bestThirds.forEach(t => {
    const isPending = !state.bestThirds.length;
    const isCorrect = state.bestThirds.includes(t);
    const kind = isPending ? "pending" : isCorrect ? "correct" : "wrong";
    html += `<span class="badge ${kind}">${esc(t)}</span>`;
  });
  html += `</div></div>`;
  return html;
}

function renderEdit() {
  let html = `<div class="section-title">Update Group Results</div>
  <div class="section-sub">Set the actual finishing positions as groups complete. Changes save instantly for everyone.</div>
  <div class="grid" style="margin-bottom:24px;">`;

  Object.keys(GROUPS).forEach(g => {
    const teams = GROUPS[g];
    const r = state.results[g] || { first:"", second:"", third:"" };
    html += `<div class="card">
      <div style="font-weight:700;font-size:14px;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
        <span class="group-label">Group ${g}</span>
        <span style="font-size:12px;color:#9ca3af;">${teams.map(t=>t.split(" ")[0]).join(" ")}</span>
      </div>`;
    ["first","second","third"].forEach(pos => {
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span class="medal" style="font-size:16px;">${MEDAL[pos]}</span>
        <select class="result-select" data-group="${g}" data-pos="${pos}">
          <option value="">â€” not set â€”</option>
          ${teams.map(t => `<option value="${esc(t)}" ${r[pos]===t?'selected':''}>${esc(t)}</option>`).join("")}
        </select>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  html += `<div class="card">
    <div style="font-weight:700;font-size:15px;margin-bottom:4px;">Best 8 Third-Place Teams (advancing)</div>
    <div style="color:#6b7280;font-size:12px;margin-bottom:14px;">Select exactly 8 third-placed teams that advance to the knockout stage.</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">`;

  let anyThird = false;
  Object.keys(GROUPS).forEach(g => {
    const third = state.results[g]?.third;
    if (!third) return;
    anyThird = true;
    const selected = state.bestThirds.includes(third);
    html += `<button class="third-pill ${selected?'selected':''}" data-team="${esc(third)}">
      ${esc(third)} <span style="font-size:11px;color:#9ca3af;">(G${g})</span>
    </button>`;
  });
  html += `</div>`;
  if (!anyThird) html += `<p style="color:#9ca3af;font-size:13px;">Set group results above to see third-place teams here.</p>`;
  html += `<div style="margin-top:10px;font-size:13px;color:#6b7280;">Selected: <strong style="color:${state.bestThirds.length===8?'#10b981':'#f97316'};">${state.bestThirds.length}/8</strong></div>`;
  html += `</div>`;
  return html;
}

function render() {
  renderTabs();
  const content = document.getElementById("content");
  if (state.tab === "leaderboard") content.innerHTML = renderLeaderboard();
  else if (state.tab === "results") content.innerHTML = renderGroupResults();
  else if (state.tab === "predictions") content.innerHTML = renderPredictions();
  else if (state.tab === "edit") content.innerHTML = renderEdit();

  // wire up interactive elements per-tab
  if (state.tab === "predictions") {
    document.querySelectorAll("[data-pidx]").forEach(b => {
      b.onclick = () => { state.selectedPredictor = parseInt(b.dataset.pidx); render(); };
    });
  }
  if (state.tab === "edit") {
    document.querySelectorAll(".result-select").forEach(sel => {
      sel.onchange = () => {
        const g = sel.dataset.group, pos = sel.dataset.pos;
        const newResults = JSON.parse(JSON.stringify(state.results));
        newResults[g] = newResults[g] || { first:"", second:"", third:"" };
        newResults[g][pos] = sel.value;
        writeResults(newResults);
      };
    });
    document.querySelectorAll(".third-pill").forEach(btn => {
      btn.onclick = () => {
        const team = btn.dataset.team;
        let list = [...state.bestThirds];
        if (list.includes(team)) list = list.filter(t => t !== team);
        else if (list.length < 8) list.push(team);
        writeBestThirds(list);
      };
    });
  }
}

render();
</script>
